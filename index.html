<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хорошилов | Кибербезопасность</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 1.1em;
            margin-bottom: 20px;
        }
        p {
            line-height: 1.6;
        }
        .links a {
            display: inline-block;
            margin: 10px;
            color: #58a6ff;
            text-decoration: none;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 5px;
            background-color: #21262d;
            transition: 0.2s;
        }
        .links a:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Я Хорошилов</h1>
        <div class="subtitle">Изучаю кибербезопасность</div>
        <p>Привет! Это мой личный сайт. Сейчас я активно учусь, разбираюсь в сетях, уязвимостях и защите данных. Скоро здесь будут мои проекты и разборы кейсов.</p>
        <div class="links">
            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="mailto:твой-email@mail.com">Контакты</a>
        </div>
    </div>
</body>
</html>
